<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボイス日記</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1 class="app-title">ボイス日記</h1>
            <div class="header-actions">
                <button id="auth-btn" class="btn btn-outline btn-sm">ログイン</button>
                <div id="user-info" class="user-info hidden">
                    <img id="user-avatar" src="" alt="User" class="avatar">
                    <span id="user-name" class="user-name"></span>
                </div>
                <button id="export-btn" class="icon-btn" title="月別出力">
                    <span class="material-icons-round">download</span>
                </button>
                <button id="theme-btn" class="icon-btn" title="テーマ切替">
                    <span class="material-icons-round">dark_mode</span>
                </button>
            </div>
        </header>

        <!-- Auth Overlay (shown when not logged in) -->
        <div id="auth-overlay" class="auth-overlay">
            <div class="auth-card">
                <span class="material-icons-round auth-icon">lock</span>
                <h2>ログインが必要です</h2>
                <p>日記データはクラウドに安全に保存されます。</p>
                <button id="login-overlay-btn" class="btn btn-primary auth-login-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"
                        class="google-icon">
                    Googleでログイン
                </button>
            </div>
        </div>

        <main class="app-main hidden" id="app-main">
            <!-- Mode Switcher -->
            <div class="mode-switcher">
                <button id="mode-diary-btn" class="mode-tab active">📝 日記</button>
                <button id="mode-training-btn" class="mode-tab">🏋️ 筋トレ</button>
            </div>

            <!-- Calendar Section -->
            <section class="calendar-section">
                <div class="calendar-header">
                    <button id="prev-month" class="icon-btn"><span
                            class="material-icons-round">chevron_left</span></button>
                    <h2 id="current-month-year" class="month-title">--年--月</h2>
                    <button id="next-month" class="icon-btn"><span
                            class="material-icons-round">chevron_right</span></button>
                </div>
                <div class="calendar-grid">
                    <!-- Days of week -->
                    <div class="days-header">
                        <div class="day-name">日</div>
                        <div class="day-name">月</div>
                        <div class="day-name">火</div>
                        <div class="day-name">水</div>
                        <div class="day-name">木</div>
                        <div class="day-name">金</div>
                        <div class="day-name">土</div>
                    </div>
                    <!-- Calendar dates will be injected here by calendar.js -->
                    <div id="calendar-dates-container" class="calendar-dates"></div>
                </div>
            </section>

            <!-- Diary View -->
            <div id="diary-view">
                <!-- Editor Section -->
                <section class="editor-section">
                    <div class="editor-header">
                        <h3 id="selected-date-display" class="selected-date">日付を選択してください</h3>
                        <div class="editor-status">
                            <span id="save-status" class="status-indicator"></span>
                        </div>
                    </div>

                    <div class="editor-controls">
                        <button id="mic-btn" class="btn btn-primary mic-btn">
                            <span class="material-icons-round">mic</span>
                            <span class="btn-text">音声入力</span>
                        </button>
                        <button id="clear-btn" class="btn btn-danger icon-btn" title="削除">
                            <span class="material-icons-round">delete_outline</span>
                        </button>
                    </div>

                    <div class="textarea-container">
                        <textarea id="diary-textarea" class="diary-input" placeholder="ここに日記を書くか、音声入力を開始してください..."
                            disabled></textarea>
                    </div>
                </section>
            </div>

            <!-- Training View -->
            <div id="training-view" class="hidden">
                <section class="training-section">
                    <div class="editor-header">
                        <h3 id="training-date-display" class="selected-date">日付を選択してください</h3>
                        <div class="training-actions">
                            <button id="master-btn" class="btn btn-outline btn-sm">種目管理</button>
                            <button id="copy-history-btn" class="btn btn-outline btn-sm">過去からコピー</button>
                        </div>
                    </div>

                    <!-- Add Record Form -->
                    <div class="training-form-container">
                        <select id="exercise-select" class="training-input">
                            <option value="">種目を選択...</option>
                        </select>

                        <div id="weight-reps-inputs" class="input-group hidden">
                            <div class="input-wrapper">
                                <input type="number" id="weight-input" class="training-input" placeholder="kg"
                                    step="0.5" min="0">
                            </div>
                            <span class="input-separator">×</span>
                            <div class="input-wrapper">
                                <input type="number" id="reps-input" class="training-input" placeholder="回" min="1">
                            </div>
                            <span class="input-separator">×</span>
                            <div class="input-wrapper">
                                <input type="number" id="sets-input" class="training-input" placeholder="Set" min="1"
                                    max="10">
                            </div>
                        </div>

                        <div id="cardio-inputs" class="input-group hidden">
                            <input type="number" id="duration-input" class="training-input small-input" placeholder="分"
                                min="1">
                        </div>

                        <button id="add-training-btn" class="btn btn-primary btn-sm" disabled>追加</button>
                    </div>

                    <!-- Records List -->
                    <div class="training-list-container">
                        <ul id="training-list" class="training-list">
                            <!-- Items injected via JS -->
                        </ul>
                    </div>

                    <!-- Interval Timer -->
                    <div id="interval-timer-container" class="timer-container hidden">
                        <div class="timer-header">休憩タイマー (3分)</div>
                        <div class="timer-display-group">
                            <div id="timer-display" class="timer-display">03:00</div>
                            <button id="timer-stop-btn" class="btn btn-danger btn-sm hidden">停止</button>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Export Modal -->
        <div id="export-modal" class="modal hidden">
            <div class="modal-content">
                <h3 class="modal-title">出力範囲の選択</h3>
                <div class="modal-body">
                    <p class="modal-desc">出力する範囲を選択してください。</p>
                    <div class="export-options">
                        <button id="export-day-btn" class="btn btn-outline">選択した日</button>
                        <button id="export-week-btn" class="btn btn-outline">選択した週</button>
                        <button id="export-month-btn" class="btn btn-outline">表示中の月</button>
                        <button id="export-year-btn" class="btn btn-outline">表示中の年</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="close-modal-btn" class="btn btn-text">キャンセル</button>
                </div>
            </div>
        </div>

        <!-- Exercise Master Modal -->
        <div id="master-modal" class="modal hidden">
            <div class="modal-content">
                <h3 class="modal-title">種目リストの管理</h3>
                <div class="modal-body">
                    <div class="add-master-form">
                        <input type="text" id="new-exercise-name" class="training-input" placeholder="新しい種目名">
                        <select id="new-exercise-category" class="training-input">
                            <option value="weight">ウェイト</option>
                            <option value="cardio">有酸素</option>
                        </select>
                        <button id="add-master-btn" class="btn btn-primary btn-sm">追加</button>
                    </div>
                    <ul id="master-list" class="master-list"></ul>
                </div>
                <div class="modal-footer">
                    <button id="close-master-btn" class="btn btn-text">閉じる</button>
                </div>
            </div>
        </div>

        <!-- Copy History Modal -->
        <div id="copy-modal" class="modal hidden">
            <div class="modal-content">
                <h3 class="modal-title">過去からコピー</h3>
                <div class="modal-body">
                    <p class="modal-desc">コピー元の日付を選択してください（選択日のデータで上書きされます）。</p>
                    <input type="date" id="copy-date-input" class="training-input">
                </div>
                <div class="modal-footer">
                    <button id="close-copy-btn" class="btn btn-text">キャンセル</button>
                    <button id="execute-copy-btn" class="btn btn-primary">コピー実行</button>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast hidden"></div>
    </div>

    <!-- Scripts -->
    <script type="module" src="storage.js"></script>
    <script type="module" src="training-storage.js"></script>
    <script type="module" src="speech.js"></script>
    <script type="module" src="calendar.js"></script>
    <script type="module" src="export.js"></script>
    <script type="module" src="training.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
